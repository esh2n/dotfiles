# tmux configuration

# ── general ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
# extended-keys off: CSI u breaks through pane-border PTY wrapper (ESC→27u).
set -g extended-keys off
# Shift+Enter: pass CSI u sequence through to inner shell (for Claude Code newline)
bind -n S-Enter send-keys Escape '[13;2u'
set -g history-limit 50000
set -g buffer-limit 20
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename on
setw -g automatic-rename on
setw -g aggressive-resize on
set -g mouse on

# ── shell ────────────────────────────────────────────────────────────
if-shell 'test -x /opt/homebrew/bin/zsh' \
  'set-option -g default-shell /opt/homebrew/bin/zsh' \
  'set-option -g default-shell /bin/zsh'

# ── pane border wrapper (rounded borders + padding) ─────────────────
if-shell 'test -x /opt/homebrew/bin/zsh' \
  'run-shell "tmux set -g default-command \"$HOME/.config/tmux/scripts/tmux-pane-border -- /opt/homebrew/bin/zsh\""' \
  'run-shell "tmux set -g default-command \"$HOME/.config/tmux/scripts/tmux-pane-border -- /bin/zsh\""'

# ── prefix ───────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# ── display ──────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000

# ── navigation ───────────────────────────────────────────────────────
bind C-c run-shell 'tmux new-session -d -s "$(~/.config/tmux/scripts/random-session-name.sh)" && tmux switch-client -t "$(tmux list-sessions -F "#{session_name}" | tail -1)"'
unbind n
unbind p
bind -n M-h previous-window
bind -n M-l next-window
bind Tab last-window
bind \\ split-window -h -c "#{?@cwd,#{@cwd},#{pane_current_path}}"
bind - split-window -v -c "#{?@cwd,#{@cwd},#{pane_current_path}}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind z resize-pane -Z
bind x kill-pane
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2
bind [ copy-mode

# ── copy mode ────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# ── spotify ──────────────────────────────────────────────────────────
bind s run-shell "~/.config/tmux/scripts/spotify.sh toggle"
bind n run-shell "~/.config/tmux/scripts/spotify.sh next"
bind N run-shell "~/.config/tmux/scripts/spotify.sh prev"

# ── floating popups (zellij-style) ───────────────────────────────────
bind e display-popup -w 90% -h 90% -b rounded -d "#{pane_current_path}" -E "nvim"
bind g display-popup -w 90% -h 90% -b rounded -d "#{pane_current_path}" -E "lazygit"

# ── plugins ──────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'catppuccin/tmux#v2.1.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hiroppy/tmux-agent-sidebar'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'schasse/tmux-jump'

# ── plugin: resurrect ───────────────────────────────────────────────
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh vim nvim man less more tail top htop'

# ── plugin: continuum ───────────────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── plugin: catppuccin (colors only — no layout interference) ────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'none'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_pane_status_enabled 'off'
set -g @catppuccin_pane_border_status 'off'

# ── plugin: tmux-agent-sidebar ──────────────────────────────────────
set -g @sidebar_key 'a'
set -g @sidebar_key_all 'A'
set -g @sidebar_width 50
set -g @sidebar_auto_create off

# ── plugin: floax ───────────────────────────────────────────────────
set -g @floax-bind 'f'
set -g @floax-bind-menu 'F'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

# ── plugin: extrakto ────────────────────────────────────────────────
set -g @extrakto_key 'X'
set -g @extrakto_popup_size '60%'

# ── plugin: tmux-fzf ────────────────────────────────────────────────
TMUX_FZF_LAUNCH_KEY="/"

# ── plugin: sessionx ────────────────────────────────────────────────
set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-preview-enabled 'true'

# ── plugin: thumbs ──────────────────────────────────────────────────
set -g @thumbs-key T
set -g @thumbs-unique enabled
set -g @thumbs-command 'echo -n {} | pbcopy'

# ── plugin: jump ────────────────────────────────────────────────────
set -g @jump-key 'w'

# ── plugin: notify ──────────────────────────────────────────────────
set -g @tnotify-verbose 'on'

# ── plugin: prefix-highlight ────────────────────────────────────────
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'

# ── initialize plugins ──────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AFTER plugins: theme + layout
#   Theme files set @theme_* variables (7 colors).
#   Layout references #{@theme_*} — evaluated at display time.
#   Theme switch: re-source theme file → layout adapts automatically.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

source-file -q ~/.config/tmux/themes/current.conf

# Override nerd-font-window-name: show directory basename for pane-border wrapper
setw -g automatic-rename-format '#{?#{m:*tmux-pane-borde*,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}'

# SSH detection (set once at config load)
if-shell '[ -n "$SSH_CONNECTION" ]' 'set -g @is_ssh 1' 'set -g @is_ssh ""'

# ── status bar ───────────────────────────────────────────────────────
#   Top position (Arc/Linear/Raycast tab bar style).
#   status 2 + empty line[1] = floating gap between bar and pane content.
#   Placement AFTER tpm is critical — plugins reset status to 1 on reload.
set -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 120
set -g status-right-length 80
set -g status-interval 5
set -g status-style "bg=default"

# Bordered status bar (3 lines: top border + content + bottom border)
set -g status 3
set -g 'status-format[0]' '#[fg=#{@theme_accent2},align=left]#(~/.config/tmux/scripts/status-border.sh top)'
set -g 'status-format[2]' '#[fg=#{@theme_accent2},align=left]#(~/.config/tmux/scripts/status-border.sh bottom)'

# status-format[1]: default status template wrapped with │ side borders
set -g 'status-format[1]' '#[fg=#{@theme_accent2}]│#[default]#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default],#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]#[fg=#{@theme_accent2}]│'

# left:  session   branch  [zoom] [COPY] [SYNC]
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[fg=#{@theme_warn},bold]  #S },#{#[fg=#{@theme_accent}]  #S }}"
set -ga status-left "#[fg=#{@theme_muted},none]#(~/.config/tmux/scripts/git-branch.sh #{pane_current_path})"
set -ga status-left "#{?window_zoomed_flag,  #[fg=#{@theme_warn}]󰁌,}"
set -ga status-left "#{?pane_in_mode,#{#[fg=#{@theme_crust},bg=#{@theme_accent2},bold] COPY #[none,bg=default]},}"
set -ga status-left "#{?synchronize-panes,#{#[fg=#{@theme_crust},bg=#{@theme_warn},bold] SYNC #[none,bg=default]},}"

# right: k8s context + ssh hostname
set -g status-right ""
set -ga status-right "#[fg=#{@theme_muted}]#(~/.config/tmux/scripts/kube-ctx.sh)"
set -ga status-right "#{?@is_ssh,#{#[fg=#{@theme_warn}]   #h },}"

# ── window tabs (centered, pill-shaped active) ───────────────────────
set -g window-status-format "  #I #W  "
set -g window-status-style "fg=#{@theme_muted}"
set -g window-status-last-style "fg=#{@theme_fg}"
set -g window-status-separator ""
set -g window-status-current-format "#[fg=#{@theme_accent2},bg=default]#[fg=#{@theme_crust},bg=#{@theme_accent2},bold] #I #W #[fg=#{@theme_accent2},bg=default]"
set -g window-status-activity-style "fg=#{@theme_warn}"
set -g window-status-bell-style "fg=#{@theme_warn}"

# ── pane borders (hidden — tmux-pane-border plugin draws its own) ────
set -g pane-border-style "bg=default"
set -g pane-active-border-style "bg=default"
set -g pane-border-lines spaces

# ── pane focus (fg-only dim — no bg change to avoid banding) ────────
set -g window-style "fg=#{@theme_muted}"
set -g window-active-style "fg=#{@theme_fg}"

# ── popup borders ────────────────────────────────────────────────────
set -g popup-border-style "fg=#{@theme_accent2}"
set -g popup-border-lines rounded

# ── messages ─────────────────────────────────────────────────────────
set -g message-style "fg=#{@theme_crust},bg=#{@theme_accent}"
set -g message-command-style "fg=#{@theme_crust},bg=#{@theme_warn}"

# ── copy mode ────────────────────────────────────────────────────────
set -g mode-style "fg=#{@theme_crust},bg=#{@theme_accent2}"
